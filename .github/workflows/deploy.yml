name: Build and deploy site

on:
  # Rebuild on every push to main (theme/css/template changes)
  push:
    branches: [main]
  # Manual trigger from the Actions tab
  workflow_dispatch:
  # Periodic refresh so newly published GitHub Issues land on the site
  # without a manual push (every 6 hours)
  schedule:
    - cron: "0 */6 * * *"

# Concurrency: cancel any in-flight run for the same ref so only the newest
# build wins. Important when issues are updated in quick succession.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

# Required permissions for actions/deploy-pages@v4
permissions:
  contents: read
  pages: write
  id-token: write

env:
  HUGO_VERSION: "0.154.2"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules: paper / xmin themes)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Setup Hugo (extended)
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Run build.sh (fetch issues + hugo --minify)
        env:
          # Auto-injected by Actions; gives the fetcher 5000 req/h instead of 60
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash build.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
