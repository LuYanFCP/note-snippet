        - heading "3. CUDA Graph" [level=2] [ref=e174]
        - paragraph [ref=e175]: CUDA Graph是什么，其实上面的很多讨论已经回答了这个问题，用一句话总结来说就是：CUDA Graph 是一种将一系列 GPU 操作（如内核执行、内存拷贝）及其前后依赖关系预先定义为一张有向无环图（DAG），然后通过单次指令将其整体打包提交给 GPU 自动调度执行的工作模型，旨在彻底消除 CPU 频繁下达指令所带来的调度开销。
        - img "Image" [ref=e176]
        - paragraph [ref=e177]: 是DAG自然就有节点和边，在CUDA Graph中节点是每个GPU的操作比如说：Kernel launches/内存操作（D2H/H2D）/内存管理（malloc/free）/Host Func/空节点（用于同步和协调）。边其实没有实际的操作，只是代表一种依赖关系，比如并行/依赖。
        - heading "3.1. Graph vs Stream：从\"事件驱动\"到\"DAG\"" [level=3] [ref=e178]
        - paragraph [ref=e179]: 以前写 CUDA 代码，默认就是用 stream。stream 本质上是个队列——你按顺序塞进去的操作，GPU 按顺序执行。简单粗暴，但问题也很明显：
        - code [ref=e182]:
          - generic [ref=e184]: // Stream 模型：线性队列，CPU 逐条提交
          - generic [ref=e186]: cudaMemcpyAsync(d_in, h_in, size, H2D, stream);
          - generic [ref=e188]: kernelA<<<grid, block, 0, stream>>>(d_in, d_tmp); // A
          - generic [ref=e190]: kernelB<<<grid, block, 0, stream>>>(d_tmp, d_out); // B，必须等 A 完事
        - paragraph [ref=e191]: 如果 B 和 C 其实没有依赖关系，可以并行跑，怎么办？传统做法是多开几个 stream，然后用 event 做同步：
        - code [ref=e194]:
          - generic [ref=e196]: cudaStream_t s1, s2;
          - generic [ref=e198]: cudaEvent_t ev;
          - generic [ref=e200]: // ... 创建 stream 和 event
          - generic [ref=e203]: kernelA<<<grid, block, 0, s1>>>();
          - generic [ref=e205]: cudaEventRecord(ev, s1); // A 完了发个信号
          - generic [ref=e208]: kernelB<<<grid, block, 0, s2>>>();
          - generic [ref=e210]: cudaStreamWaitEvent(s2, ev); // B 等 A
          - generic [ref=e212]: kernelC<<<grid, block, 0, s2>>>(); // C 也等 A，但 B 和 C 可以并行
        - img "Image" [ref=e213]
        - paragraph [ref=e214]: 代码马上变得又臭又长。而且这只是两个并行分支，实际推理里有几十个 kernel，手动管 event就非常麻烦
        - paragraph [ref=e215]: Graph 的做法完全不同——你直接画一张依赖图：
        - img "Image" [ref=e216]
        - paragraph [ref=e217]: 不需要手动管 event，runtime 看到图结构就知道 B 和 C 可以一起跑，D 必须等它俩都完。这是声明式（declarative）vs 命令式（imperative）的区别。
        - blockquote [ref=e218]:
          - paragraph [ref=e219]: 图是静态的因此编译器会静态的分配好所有资源，且不需要调度。这也是双刃剑，静态意味着丧失了灵活性，这也是他主要用在推理上的原因。
        - heading "3.2. Graph 里能放什么？" [level=3] [ref=e220]
        - paragraph [ref=e221]: DAG 自然就有节点和边。节点是实际干活的操作，边只是依赖关系（没有实际计算）。
        - paragraph [ref=e222]: CUDA Graph 支持的节点类型比我想象的多：
