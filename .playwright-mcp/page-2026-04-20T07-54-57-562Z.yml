        - paragraph [ref=e256]: 对于 LLM 推理来说，绝大部分节点是 Kernel，偶尔有 Memcpy（比如从 host 拷 input_ids）。Host callback 在性能敏感路径上基本不用，因为它会强制 sync，把 GPU 卡住等 CPU 执行 callback。
        - paragraph [ref=e257]: 边（edge）的概念更简单——就是"谁先谁后"的关系。A → B 表示 B 必须等 A 完事。如果两个节点之间没有路径相连，runtime 就会自动让它们并行。
        - heading "3.3. 三个阶段：Define → Instantiate → Launch" [level=3] [ref=e258]
        - paragraph [ref=e259]: CUDA Graph的生命周期分三步：
        - paragraph [ref=e260]:
          - strong [ref=e261]: 1. Define（定义）
        - paragraph [ref=e262]:
          - text: 构建图的拓扑结构——加节点、连边。这个阶段产物是
          - code [ref=e263]: cudaGraph_t
          - text: ，只是个"图纸"，可以修改（比如加节点、删边）。
        - paragraph [ref=e264]:
          - strong [ref=e265]: 2. Instantiate（实例化）
        - paragraph [ref=e266]:
          - text: 把图纸编译成可执行文件。CUDA 会验证拓扑合法性（比如有没有环）、预分配内部资源、生成执行计划。产物是
          - code [ref=e267]: cudaGraphExec_t
          - text: ，这一步之后图就"冻结"了，不能直接改结构。
        - paragraph [ref=e268]:
          - strong [ref=e269]: 3. Launch（启动）
        - paragraph [ref=e270]: 把实例化的图提交到一个 stream 上执行。一次 launch = 整个 DAG 的所有操作一次性扔给 GPU。
        - blockquote [ref=e271]:
          - paragraph [ref=e272]:
            - text: 为什么要分三步？核心原因是
            - strong [ref=e273]: 开销分离
            - text: 。Define 和 Instantiate 的代价只付一次，之后每次推理只需要付 Launch 的极小代价。如果每次都要重新 Define + Instantiate，那 Graph 的优势就没了。
        - paragraph [ref=e274]:
          - text: 另外，Instantiate 之后也不是完全不能改——可以通过
          - code [ref=e275]: cudaGraphExecKernelNodeSetParams()
          - text: 更新节点参数（比如换输入 buffer 的指针），不需要重新 Instantiate。这点对推理很重要，因为每次输入数据会变，但图的结构不变。
        - heading "3.4. 怎么构建 Graph？两种方式" [level=3] [ref=e276]
        - paragraph [ref=e277]:
          - strong [ref=e278]: 方式一：Explicit API（手动拼）
        - paragraph [ref=e279]: 直接调用 CUDA API 添加节点和边：
        - code [ref=e282]:
          - generic [ref=e284]: cudaGraph_t graph;
          - generic [ref=e286]: cudaGraphCreate(&graph);
          - generic [ref=e289]: // 添加一个 kernel 节点
          - generic [ref=e291]: cudaGraphNode_t kernelNode;
          - generic [ref=e293]: "cudaKernelNodeParams params = {...};"
          - generic [ref=e295]: cudaGraphAddKernelNode(&kernelNode, graph, NULL, 0, &params);
          - generic [ref=e298]: // 添加依赖边
          - generic [ref=e300]: cudaGraphAddDependencies(graph, &nodeA, &nodeB, 1); // A → B
        - paragraph [ref=e301]: 优点是控制精细，缺点是代码啰嗦。一般只在需要极致优化或者图结构动态变化时使用。
        - paragraph [ref=e302]:
          - strong [ref=e303]: 方式二：Stream Capture（自动录）
        - paragraph [ref=e304]: 更常用的做法——在你现有的 stream 代码外包一层 capture，CUDA 自动帮你生成图：
        - code [ref=e307]:
          - generic [ref=e309]: cudaGraph_t graph;
          - generic [ref=e311]: cudaStreamBeginCapture(stream, cudaStreamCaptureModeGlobal);
          - generic [ref=e314]: // 这里写你原来的代码，会被自动录下来
          - generic [ref=e316]: kernelA<<<grid, block, 0, stream>>>();
          - generic [ref=e318]: kernelB<<<grid, block, 0, stream>>>();
          - generic [ref=e320]: // ...
          - generic [ref=e323]: cudaStreamEndCapture(stream, &graph);
        - paragraph [ref=e324]:
          - text: PyTorch 的
          - code [ref=e325]: torch.cuda.CUDAGraph
          - text: 就是基于 Stream Capture 封装的。这种方式对现有代码侵入小，是推理优化的首选。
        - separator [ref=e326]
        - heading "4. PyTorch上如何使用CUDA Graph" [level=2] [ref=e327]
        - paragraph [ref=e328]:
          - text: 前面讲的都是 CUDA C++ 层面的 API，但实际项目里我用的是 PyTorch。PyTorch 提供了
          - code [ref=e329]: torch.cuda.CUDAGraph
          - text: ，把底层的 capture、instantiate、launch 包装成了几行 Python 代码。尤其是对于
          - code [ref=e330]: capture
          - text: 模式来说，官方文档给的example其实就这几行
          - superscript [ref=e331]:
            - link "2" [ref=e332] [cursor=pointer]:
              - /url: "#fn:2"
          - text: ：
        - code [ref=e335]:
          - generic [ref=e337]: import torch
          - generic [ref=e340]: "# Enable CUDA Graph mode in PyTorch"
          - generic [ref=e342]: model = YourModel().cuda()
          - generic [ref=e344]: static_input = torch.randn(32, 3, 224, 224, device='cuda')
          - generic [ref=e347]: "# Warmup"
          - generic [ref=e349]: "for _ in range(3):"
          - generic [ref=e351]: _ = model(static_input)
          - generic [ref=e354]: "# Capture the graph"
          - generic [ref=e356]: g = torch.cuda.CUDAGraph()
          - generic [ref=e358]: "with torch.cuda.graph(g):"
          - generic [ref=e360]: static_output = model(static_input)
          - generic [ref=e363]: "# Training loop - replay the graph"
          - generic [ref=e365]: "for data in dataloader:"
          - generic [ref=e367]: "static_input.copy_(data) # Update input in-place"
          - generic [ref=e369]: "g.replay() # Execute captured operations"
        - paragraph [ref=e370]: 代码中其实也涉及到几个核心问题：
        - list [ref=e371]:
          - listitem [ref=e372]: 静态的输入和输出
          - listitem [ref=e373]: warmup
          - listitem [ref=e374]: capture限制
        - blockquote [ref=e375]:
          - paragraph [ref=e376]:
            - text: 当前Pytorch CUDA Graph API只支持Capture，因为本身pytorch使用的是动态图(eager mode) 和声明式的静态图有一定的理念冲突。如果需要使用python+Explicit API 推荐直接使用
            - code [ref=e377]: cuda-python
            - text: 。
        - heading "4.1. 为什么是静态" [level=3] [ref=e378]
        - paragraph [ref=e379]:
          - text: Graph 要求"静态"的核心原因：它录制的是
          - strong [ref=e380]: 指针地址
          - text: ，而不是
          - strong [ref=e381]: 数据内容
          - text: 。
        - code [ref=e383]: 录制时：kernel 从 d_input=0x7f00_1000 读，往 d_output=0x7f00_2000 写 ↓ 图中记录的就是这两个具体地址 ↓ 每次 replay：GPU 去 0x7f00_1000 读，往 0x7f00_2000 写
        - paragraph [ref=e384]:
          - text: 如果中间你把
          - code [ref=e385]: d_input
          - text: 给 free 了，重新 malloc 一个，地址变成
          - code [ref=e386]: 0x7f00_5000
          - text: ，但图还去读
          - code [ref=e387]: 0x7f00_1000
          - text: ——直接段错误。
        - paragraph [ref=e388]:
          - text: 所以 Graph 的"静态"不是指数据不能变，而是
          - strong [ref=e389]: 地址不能变
          - text: 。实际推理时的模式是：
        - code [ref=e392]:
          - generic [ref=e394]: "# 1. 预分配固定 buffer（整个生命周期不释放）"
          - generic [ref=e396]: static_input = torch.empty(max_batch, max_seq_len, device='cuda')
          - generic [ref=e399]: "# 2. 每次推理：往固定地址填新数据"
          - generic [ref=e401]: static_input.copy_(new_input)
          - generic [ref=e404]: "# 3. replay：图从同一个地址读"
          - generic [ref=e406]: g.replay()
          - generic [ref=e409]: "# 4. 读结果：从固定地址拷出来"
          - generic [ref=e411]: result = static_output.clone()
        - paragraph [ref=e412]:
          - strong [ref=e413]: 指针不变，数据变。
          - text: 这是 Graph 能work的前提。
        - paragraph [ref=e414]:
          - text: PyTorch 的
          - code [ref=e415]: static_input.copy_(data)
          - text: 和
          - code [ref=e416]: static_output.clone()
          - text: 这对操作看着有点别扭——一个往里写，一个往外读——但目的都是保护图中的静态地址不被破坏。
        - paragraph [ref=e417]:
          - text: 除了输入输出，Graph 对模型内部的操作也有不少限制
          - superscript [ref=e418]:
            - link "3" [ref=e419] [cursor=pointer]:
              - /url: "#fn:3"
          - text: ：
        - paragraph [ref=e420]:
          - strong [ref=e421]: 内存分配相关（最严格的限制）
        - list [ref=e422]:
          - listitem [ref=e423]:
            - code [ref=e424]: tensor.resize_()
            - text: /
            - code [ref=e425]: tensor.resize_as_()
            - text: —— 可能改变底层存储地址
          - listitem [ref=e426]: 任何导致 tensor 重新分配内存的操作 —— 比如 cat 后赋值给原变量
          - listitem [ref=e427]: 动态创建新 tensor —— capture 期间分配的内存地址被钉住，但如果在图执行期间再分配，地址不稳定
        - paragraph [ref=e428]:
          - strong [ref=e429]: 同步操作
        - list [ref=e430]:
          - listitem [ref=e431]:
            - code [ref=e432]: torch.cuda.synchronize()
            - text: —— capture 期间操作不执行，sync 会死锁
          - listitem [ref=e433]:
            - code [ref=e434]: tensor.item()
            - text: /
            - code [ref=e435]: tensor.tolist()
            - text: —— 把 GPU 数据拷到 CPU，隐含同步
          - listitem [ref=e436]:
            - code [ref=e437]: print(tensor)
            - text: —— 同上，要读值就必须 sync
        - paragraph [ref=e438]:
          - strong [ref=e439]: 数据依赖的控制流
        - list [ref=e440]:
          - listitem [ref=e441]:
            - code [ref=e442]: "if tensor.sum() > 0:"
            - text: —— 条件依赖 tensor 的值，但 capture 期间值不存在
          - listitem [ref=e443]:
            - code [ref=e444]: "for i in range(tensor.size(0)):"
            - text: —— 如果 size 是动态的，每次可能不一样
          - listitem [ref=e445]: 任何需要知道 tensor 具体值才能决定走哪条分支的代码
        - paragraph [ref=e446]:
          - strong [ref=e447]: 一些安全替代方案
        - code [ref=e450]:
          - generic [ref=e452]: "# 不安全"
          - generic [ref=e454]: "if x.sum() > 0:"
          - generic [ref=e456]: y = x * 2
          - generic [ref=e458]: "else:"
          - generic [ref=e460]: y = x + 1
          - generic [ref=e463]: "# 安全 —— 用 mask 代替分支"
          - generic [ref=e465]: mask = (x > 0).float()
          - generic [ref=e467]: y = mask * (x * 2) + (1 - mask) * (x + 1)
          - generic [ref=e470]: "# 不安全"
          - generic [ref=e472]: "for i in range(batch_size): # batch_size 是 tensor 的值"
          - generic [ref=e474]: process(x[i])
          - generic [ref=e477]: "# 安全 —— 用固定次数的循环"
          - generic [ref=e479]: "for i in range(MAX_BATCH): # MAX_BATCH 是常量"
          - generic [ref=e481]: "if i < batch_size:"
          - generic [ref=e483]: process(x[i])
        - paragraph [ref=e484]:
          - text: 简单来说：
          - strong [ref=e485]: 图的拓扑结构必须是固定的
          - text: ，不能依赖运行时数据做任何决策。
        - heading "4.2. 为什么 Warmup 是必须的？" [level=3] [ref=e486]
        - paragraph [ref=e487]: 一开始我以为 warmup 只是"让性能稳定"，后来发现没有它根本 capture 不对。
        - paragraph [ref=e488]: PyTorch 很多操作是 lazy 的：
        - list [ref=e489]:
          - listitem [ref=e490]: cuDNN 卷积第一次会 benchmark 不同算法
          - listitem [ref=e491]: JIT 编译的 kernel 第一次调用时才编译
          - listitem [ref=e492]: cuBLAS workspace 第一次 matmul 时才分配
        - paragraph [ref=e493]: 这些"第一次"会产生额外的内存分配和 kernel launch。如果在 capture 期间触发，会被录进图里——之后每次 replay 都重新选算法/编译，完全不对。
        - paragraph [ref=e494]:
          - strong [ref=e495]: Warmup 的作用：提前触发所有 lazy 初始化，让 capture 只录到"稳态"的操作序列。
        - paragraph [ref=e496]: 为什么通常跑 3 次？第 1 次触发 cuDNN benchmark 和 JIT 编译，第 2 次某些 allocator 策略可能调整，第 3 次确认真的稳态了。
        - heading "4.3. Capture 期间的限制" [level=3] [ref=e497]
        - paragraph [ref=e498]: capture期间其实类似我们开发软件的时候的MOCK执行，很多行为都是被mock掉的，而不是真实执行的，只是通过mock+capture快速的从算子流中捕获整体的图，因此除了之前的静态的限制还有如下限制：
        - list [ref=e499]:
          - listitem [ref=e500]:
            - strong [ref=e501]: 同步操作会死锁
        - code [ref=e504]:
          - generic [ref=e506]: "# 错误：capture 期间 sync 会卡住"
          - generic [ref=e508]: "with torch.cuda.graph(g):"
          - generic [ref=e510]: x = model(input)
          - generic [ref=e512]: "torch.cuda.synchronize() # 死锁！操作根本没执行，你在等一个永远不会完成的事"
        - paragraph [ref=e513]: sync 要等操作完成，但 capture 期间操作是 mock 的，没真跑，所以 sync 永远等不到。
        - list [ref=e514]:
          - listitem [ref=e515]:
            - strong [ref=e516]: 不能读 tensor 的值
        - code [ref=e519]:
          - generic [ref=e521]: "# 错误：capture 期间 tensor 的值不存在"
          - generic [ref=e523]: "with torch.cuda.graph(g):"
          - generic [ref=e525]: x = model(input)
          - generic [ref=e527]: "print(x[0]) # 报错：无法读取值"
          - generic [ref=e529]: "if x.sum() > 0: # 报错：条件依赖值"
          - generic [ref=e531]: ...
        - paragraph [ref=e532]: 这限制比想象中严。比如你想打个 log 看中间结果，在 capture 期间是完全做不到的。只能先 capture 完，replay 的时候再想办法看。
        - list [ref=e533]:
          - listitem [ref=e534]:
            - strong [ref=e535]: 控制流必须静态
        - code [ref=e538]:
          - generic [ref=e540]: "# 错误：依赖 tensor 值的控制流"
          - generic [ref=e542]: "with torch.cuda.graph(g):"
          - generic [ref=e544]: "for i in range(seq_len): # seq_len 如果是 tensor 的值，不行"
          - generic [ref=e546]: process(x[i])
          - generic [ref=e549]: "# 正确：用固定次数 + mask"
          - generic [ref=e551]: "with torch.cuda.graph(g):"
          - generic [ref=e553]: "for i in range(MAX_LEN): # MAX_LEN 是 Python 常量"
          - generic [ref=e555]: mask = (i < seq_len).float()
          - generic [ref=e557]: out += mask * process(x[i])
        - paragraph [ref=e558]: 实际推理里 seq_len 每次可能不一样，但图结构必须固定。解决办法是用最大长度循环，然后用 mask 把无效位置置零。
