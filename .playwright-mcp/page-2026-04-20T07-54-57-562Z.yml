        - heading "【模型推理】浅谈CUDA Graph" [level=1] [ref=e14]
        - generic [ref=e15]:
          - time [ref=e16]: Apr 20, 2026
          - text: · LuYanFCP
      - generic [ref=e17]:
        - paragraph [ref=e18]: CUDA Graph 算是在推理优化里被提到最多的特性之一了。原理倒是不复杂：把原本一次次 launch 的 kernel 打包成一张静态图，一次性扔给 GPU，省掉中间的调度开销。
        - paragraph [ref=e19]: 但这个"打包"具体怎么做？PyTorch 里怎么用？以及最重要的是——在 H200 上到底能快多少？
        - paragraph [ref=e20]: 这篇文章就是把这几个问题摸清楚的过程记录。
        - heading "1. LLM 推理在忙什么" [level=2] [ref=e21]
        - paragraph [ref=e22]: Graph 能减少 kernel launch 的开销，但为什么 LLM 推理特别需要这个？先简单说下背景。
        - paragraph [ref=e23]: 老生常谈的问题，LLM 推理分两个阶段：
        - paragraph [ref=e24]:
          - strong [ref=e25]: Prefill
        - list [ref=e26]:
          - listitem [ref=e27]: 输入是用户的一整段 prompt
          - listitem [ref=e28]: 一次性做完整的 self-attention 计算，然后讲产生的KVCache写入显存或者其他存储设备，从而在Decode阶段使用。
          - listitem [ref=e29]: 特点是计算密集，kernel消耗的时间比较多，GPU 利用率相对高，同时对内存IO要要求比较低。总之就compute-bound，算力是决定他的速度的关键。
        - paragraph [ref=e30]:
          - strong [ref=e31]: Decode
        - list [ref=e32]:
          - listitem [ref=e33]: 自回归过程，每次只生成一个 token
          - listitem [ref=e34]:
            - text: 要用到之前计算的 KV Cache，只做必要的更新，对于单个请求推理的时候我们输入model的Tensor维度为
            - code [ref=e35]: "[1, D]"
            - text: ", 其中D是Embedding的维度。"
          - listitem [ref=e36]: 特点是memory-bound, 单个请求计算量少，但是需要load KVCache巨大，而且推理的时间越长，KVCache load的压力就越大。
        - paragraph [ref=e37]: 对于这个推理过程，我们可以认为CPU step2step的将模型每一层计算所需要的kernel相关数据和元数据准备好，调用launch通知GPU执行，然后异步的准备下一次计算所需要的信息的过程。
        - paragraph [ref=e38]: 此时因为不同Prefill和Decode不同特点，CPU与GPU直接的协作和等待有不同的表现
        - list [ref=e39]:
          - listitem [ref=e40]: Prefill 由于Kernel计算时间比较长，因此CPU侧的开销其实基本可以被GPU的运算Overlap掉，因此关注点核心应该是GPU Kernel如何跑更快。
        - img "Image" [ref=e41]
        - list [ref=e42]:
          - listitem [ref=e43]: Decode阶段，其实就是两个地方了，首先Kernel计算量比较小，因此开销时间很少，这种情况就出现了GPU等CPU等情况，这也是就是为什么我们常说Decode阶段需要开CUDA Graph的，原因，CUDA Graph的目标就是消除GPU等CPU的问题，让GPU计算更高效。
        - img "Image" [ref=e44]
        - paragraph [ref=e45]: 如今其实也有主流的推理框架也支持Prefill阶段的CUDA Graph，这个主要是因为在推理过程中模型有大量的小kernel，比如说Norm这类的Kernel，这种其实也类似于Decode阶段的样子，GPU也需要等待CPU，因此CUDA Graph也是可以计算的，至于细节后面我会再写一篇专门介绍Prefill Piecewise CUDA Graph的一些细节。
        - separator [ref=e46]
        - heading "2. Pytorch在推理的时候CPU纠结在做什么？" [level=2] [ref=e47]
        - paragraph [ref=e48]: 因为像Pytorch这种框架一般对于一个算子支持很多Kernel的实现，因此为了支持这么多Kernel的实现就回有大量的dispatch的代码用来运行时自动路由到不同的kernel上，同时也会有很多准备工作，所有工作完成之后就调用cudaLaunchKernel交给CUDA的runtime层做一些准备工作并发送给GPU。在GPU运行的时候其实也会有一些操作，比如说GPU侧做Kernel环境的准备，在执行后也会有一些清理状态的后处理。 总结来说就如图，一个Kernel从Pytorch发起执行到做完运行有这几个步骤：
        - list [ref=e49]:
          - listitem [ref=e50]:
            - text: "CPU:"
            - list [ref=e51]:
              - listitem [ref=e52]: Pytorch C++ Dispatch
              - listitem [ref=e53]: Kernel Launcher Prepare
              - listitem [ref=e54]: cudaLaunchKernel
          - listitem [ref=e55]:
            - text: "GPU:"
            - list [ref=e56]:
              - listitem [ref=e57]: Command Processor
              - listitem [ref=e58]: Kernel Execute
              - listitem [ref=e59]: Post-Process
        - img "Image" [ref=e60]
        - heading "2.1. Pytorch Dispatch & Kernel Prepare" [level=3] [ref=e61]
        - paragraph [ref=e62]: "Pytorch Dispatch: 这个其实是所有支持多种Kernel+使用Python实现执行前端框架的通病。"
        - list [ref=e63]:
          - listitem [ref=e64]: 跨语言开销：调用过程中必须包含多语言的之间的走bind或者其他机制从Python到C++到调用开销。
          - listitem [ref=e65]: 检查并找到需要执行的Kernel函数指针：这个过程不一定发生在C++层，比如说Sglang的很多Kernel的Dispatch就发生在Python层。
          - listitem [ref=e66]: 准备数据和元数据：Dispatch的时候由于不同Kernel要求输入的内存布局/参数以及元数据的不同，因此这里框架也需要一个转化。
        - paragraph [ref=e67]: Kernel Prepare：主要是执行Kernel之前做一些提取裸指针/Grid/Block 维度计算/计算ShareMemory的过程。这些步骤在现代推理引擎中一般由比较专业的Kernel库来完成，比如说Flashinfer/Cutlass/Triton来完成。
        - list [ref=e68]:
          - listitem [ref=e69]: 取裸指针：CUDA Kernel 是不认识 PyTorch 的 Tensor 对象的。准备阶段需要调用 .data_ptr()，把 q, k_cache, v_cache 的底层显存物理地址（指针）全抽出来。
          - listitem [ref=e70]:
            - text: Grid/Block 维度计算：比如说推理的时候，每个请求的序列长度都不一样，而且 大部分框架都是用了 Paged KV Cache。因此，在这个阶段，CPU 必须根据当前的 Batch Size、每个 sequence 的真实长度、KV Cache Block 的映射表（Block Tables）来动态计算：
            - strong [ref=e71]: 我需要启动多少个 CUDA Block？每个 Block 分配多少个线程（Threads）去处理哪个 token？
            - text: 当前因为现在很多Kernel都是用一些JIT手段提前编译好了这些参数，因此这个阶段也经常去做动态找到Match输入条件的这些预编译的Kernel。
          - listitem [ref=e72]: 计算ShareMemory/Stage这些参数。
        - paragraph [ref=e73]: 完成这些步骤之后就完全交给cudaLaunchKernel去准备和执行Kernel。
        - heading "2.2. Kernel Launch" [level=3] [ref=e74]
        - paragraph [ref=e75]:
          - text: 在代码中Kernel Launch其实就是这样一个调用
          - code [ref=e76]: kernel<<<grid, block>>>(...)
          - text: 这个语法背后发生的很多事，主要就是给GPU发执行指令之前runtime的准备，比如说：
        - list [ref=e77]:
          - listitem [ref=e78]:
            - strong [ref=e79]: 参数准备
            - text: ：把 kernel 参数拷到 constant memory
          - listitem [ref=e80]:
            - strong [ref=e81]: 配置解析
            - text: ：grid、block、shared memory、stream 等配置
          - listitem [ref=e82]:
            - strong [ref=e83]: 命令入队
            - text: ：生成一个 kernel launch command，插入到 stream 的 command queue
          - listitem [ref=e84]:
            - strong [ref=e85]: 可能的发送
            - text: ：如果 queue 满了或需要同步，通过 driver 发给 GPU
        - paragraph [ref=e86]: 在推理中，这些步骤每次都要走一遍，无论 kernel 本身多简单。对于计算时间长的kernel（比如 matmul），launch 开销占比可以忽略；但对于 tiny kernel（比如 element-wise 的 rms_norm），launch 时间和执行时间可能差不多长。
        - paragraph [ref=e87]: 这就好比你去餐厅点餐：
        - list [ref=e88]:
          - listitem [ref=e89]: 点一份牛排（计算时间长的kernel），等餐 30 分钟，点餐 1 分钟，占比很小
          - listitem [ref=e90]: 点一杯水（tiny kernel），倒水只要 5 秒，但点餐还是要 1 分钟，占比巨大。
        - heading "2.3. Command Process & Post Process" [level=3] [ref=e91]
        - paragraph [ref=e92]: "Command Processor: 负责接收指令、解析grid/dim、并在SM上分配任务。CPU 发来一个 Kernel A，Command Processor 接收、解析、调度。执行完后，它必须停下来，等待 CPU 通过 PCIe 总线发来 Kernel B 的指令。即使 CPU 发得很快，Command Processor 每次处理独立指令、评估 Stream 依赖关系都是有硬件周期开销的。"
        - blockquote [ref=e93]:
          - paragraph [ref=e94]: Cuda Graph就像我们C++编程中使用很多预编译的模版一样，相当于把动态Process过程转化为静态的了，完成Kernel A就直接做Kernel B相当于完全静态的过程，不需要调度。
        - paragraph [ref=e95]: Post Process：主要是更新状态机和尤其是同步点的信息。
