        - heading "7. 总结" [level=2] [ref=e975]
        - paragraph [ref=e976]: 捋完这一圈，关于 CUDA Graph 使用大概有这几个结论：
        - paragraph [ref=e977]:
          - strong [ref=e978]: 什么场景值得用
        - list [ref=e979]:
          - listitem [ref=e980]: Decode 阶段收益最明显。Prefill 的 kernel 大，launch 开销占比小；Decode 全是 tiny kernel，CPU 提交成了瓶颈。实测 Qwen3-0.6B 在 H200 上 decode 能快 3.6 倍，这个差距在更小模型上会更夸张。
          - listitem [ref=e981]: Batch size 固定或者变化范围小的服务场景。动态 shape 是 Graph 的天敌，要么预分配最大 buffer 浪费内存，要么维护一堆不同尺寸的 graph。
          - listitem [ref=e982]: 已经做完算子融合的模型。如果 kernel 数量还是上百个，Graph 的收益会被摊薄。
        - paragraph [ref=e983]:
          - strong [ref=e984]: 主要的代价和限制
        - list [ref=e985]:
          - listitem [ref=e986]: 内存。StaticCache + Graph 的静态 buffer，意味着要按最大可能长度预分配，显存占用比动态分配高。
          - listitem [ref=e987]: 灵活性。控制流必须用 mask 代替分支，调试时不能 print 中间结果，调试特别困哪
          - listitem [ref=e988]: 首次捕获的 overhead。Warmup + Capture 要花几十到几百毫秒，对冷启动敏感的场景是个问题。
